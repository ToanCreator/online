<style>

  }
  body {

  }
  body.dark {

  }
  /* Existing #app rule */
#app {
  max-width: 600px;
  margin: 0 auto;
  padding: 15px;
}

/* Media query for larger screens (e.g., tablets and desktops) */
@media (min-width: 768px) {
  #app {
    max-width: 960px; /* Or any wider value you prefer, e.g., 900px, 1200px */
    padding: 20px; /* Optional: Increase padding for more space on larger screens */
  }

  /* Optional: Adjust button widths for larger screens if they look too wide */
  .btn {
    max-width: 400px; /* Make main buttons a bit wider */
  }

  /* Optional: Adjust status bar layout for larger screens */
  .status-bar {
    font-size: 1.1em;
  }
}
  h1, h3 {
    text-align: center;
    margin: 10px 0;
  }
  h2 {
    text-align: center;
    margin: 10px 0;
    color: #FF00FF;
  }
  hr {
    border:none; border-bottom: 3px solid black;
    margin: 5px 0 25px 0;
  }
  .btn {
    background: #3399FF;
    border-radius: 8px;
    border:none;
    color: white;
    font-weight: bold;
    font-size: 1.2em;
    padding: 15px;
    width: 100%;
    max-width: 350px;
    margin: 10px auto;
    cursor: pointer;
    display: block;
    box-sizing: border-box;
    text-align: center;
    border: 3px solid transparent;
    user-select: none;
  }
  .btn:hover {
    background: var(--yellow-dark);
  }
  .btn svg {
    vertical-align: middle;
  }
  .question-container {
    margin-bottom: 20px;
    color: var(--orange) !important;
    font-weight: bold;
    font-size: 1.08em;

  }
  body.dark .question-container {
    color: var(--orange) !important;
  }
  .answers {
    margin-top: 15px;
  }
  .answer-btn {
    display: block;
    width: 100%;
    border: 2px solid black;
    border-radius: 6px;
    background-color: white;
    color: black;
    font-size: 1em;
    padding: 12px 10px;
    margin: 7px 0;
    cursor: pointer;
    text-align: left;
    user-select: none;
    transition: background-color 0.3s, border-color 0.3s, color 0.3s;
  }
  .answer-btn:hover:not(.disabled) {
    background-color: #eee;
  }
  body.dark .answer-btn {
    background-color: #222;
    color: white;
    border-color: white;
  }
  body.dark .answer-btn:hover:not(.disabled) {
    background-color: #444;
  }
  .answer-btn.correct {
    background-color: var(--green) !important;
    color: white !important;
    border-color: var(--green) !important;
  }
  .answer-btn.incorrect {
    background-color: var(--red) !important;
    color: white !important;
    border-color: var(--red) !important;
  }
  body.dark .answer-btn.correct {
    background-color: var(--green) !important;
    color: white !important;
    border-color: var(--green) !important;
  }
  body.dark .answer-btn.incorrect {
    background-color: var(--red) !important;
    color: white !important;
    border-color: var(--red) !important;
  }
  .disabled {
    pointer-events: none;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .star-container {
    text-align: center;
    margin: 20px 0 10px 0;
  }
  .star {
    font-size: var(--star-size);
    margin: 0 5px;
    color: var(--starsGray);
  }
  .star.Green {
    color: var(--Green);
  }
  .star.red {
    color: var(--red);
  }

    background: lime;
    color: white;
    font-size: 1.5em;
    padding: 12px 0;
    margin: 25px auto;
    width: 150px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    display: block;
  }

    width: 100%;
    min-height: 80px;
    font-size: 1em;
    padding: 10px;
    border-radius: 6px;
    border: 2px solid black;
    resize: vertical;
    box-sizing: border-box;
  }
  body.dark .input-textarea {
    background-color: #222;
    color: white;
    border-color: white;
  }

    padding: 8px 15px;

  // --- UTILITY FUNCTIONS ---
  function shuffleArray(arr) {
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function escapeHtml(unsafe) {
    return unsafe
      .replace(/</g, "‹")
      .replace(/>/g, "›")
      .replace(/"/g, "'");
  }

  // --- DOM ELEMENTS ---
  const btnMulti = document.getElementById('btn-multi');
  const btnTrueFalse = document.getElementById('btn-truefalse');

  const questionBlock = document.getElementById('question-block');
  const answersBlock = document.getElementById('answers-block');
  const essayInputBlock = document.getElementById('essay-input-block');
  const essayAnswerTextarea = document.getElementById('essay-answer');
  const btnEssaySubmit = document.getElementById('btn-essay-submit');
  const btnNext = document.getElementById('btn-next');

  const timerSpan = document.getElementById('timer');
  const doneCountSpan = document.getElementById('done-count');
  const correctCountSpan = document.getElementById('correct-count');
  const wrongCountSpan = document.getElementById('wrong-count');

  const resultSection = document.getElementById('result-section');
  const resultTime = document.getElementById('result-time');
  const resultTotal = document.getElementById('result-total');

  const starRating = document.getElementById('star-rating');

  const btnHome = document.getElementById('btn-home');

  // --- STATE VARIABLES ---
  let quizType = null; // 'multi', 'truefalse', 'essay'
  let questions = [];
  let currentQIdx = 0;
  let timerInterval = null;
  let timeSeconds = 0;
  let doneCount = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let currentTFAnswerIdx = 0;

  // --- TIMER FUNCTIONS ---
  function startTimer() {
    timeSeconds = 0;
    timerSpan.textContent = formatTime(timeSeconds);
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeSeconds++;
      timerSpan.textContent = formatTime(timeSeconds);
    }, 1000);
  }

  function stopTimer() {
    if(timerInterval) clearInterval(timerInterval);
  }

  function formatTime(s) {
    const m = Math.floor(s/60);
    const sec = s % 60;
    return (m < 10 ? '0' + m : m) + ':' + (sec < 10 ? '0' + sec : sec);
  }

  // --- QUIZ FUNCTIONS ---
  function resetStats() {
    doneCount = 0;
    correctCount = 0;
    wrongCount = 0;
    doneCountSpan.textContent = "0";
    correctCountSpan.textContent = "0";
    wrongCountSpan.textContent = "0";
  }

  function initQuiz(type) {
    quizType = type;
    currentQIdx = 0;
    resetStats();

    if(type === 'multi') {
      questions = multiChoiceQuestions.map(q => ({
        q: q.q,
        qImage: q.qImage,
        answers: shuffleArray(q.answers.slice())
      }));
      shuffleArray(questions);
    } else if(type === 'truefalse') {
      questions = trueFalseQuestions.map(q => ({
        q: q.q,
        qImage: q.qImage,
        answers: shuffleArray(q.answers.slice())
      }));
      shuffleArray(questions);
      currentTFAnswerIdx = 0;
    } else if(type === 'essay') {
      questions = essayQuestions.map(q => ({
        q: q.q,
        qImage: q.qImage,
        answerRef: q.answerRef,
        answerRefImage: q.answerRefImage
      }));
      shuffleArray(questions);
    }
    
    quizSection.style.display = 'block';
    resultSection.style.display = 'none';
    btnMulti.style.display = 'none';
    btnTrueFalse.style.display = 'none';
    btnEssay.style.display = 'none';
    btnExit.style.display = 'none'; // Ẩn nút Exit khi bắt đầu quiz
    toggleThemeBtn.style.display = 'none'; // Ẩn nút chuyển theme khi vào quiz
    btnDownload.style.display = 'none';

    showQuestion();
    startTimer();
  }

  function showQuestion() {
    // Ẩn nút "Tiếp tục" nếu nó đang hiển thị
    btnNext.style.display = 'none'; 
    // Nếu là dạng tự luận, nút "Xong" (submit) sẽ được hiển thị, ngược lại ẩn
    btnEssaySubmit.style.display = (quizType === 'essay') ? 'block' : 'none';
    // Đảm bảo nút "Xong" được kích hoạt lại cho câu hỏi tự luận mới
    btnEssaySubmit.disabled = false; 

    answersBlock.innerHTML = ''; // Xóa các câu trả lời cũ
    essayInputBlock.style.display = 'none'; // Ẩn khung nhập tự luận
    essayAnswerTextarea.value = ''; // Xóa nội dung cũ trong khung tự luận
    
    if (currentQIdx >= questions.length) {
      endQuiz();
      return;
    }

    const currentQ = questions[currentQIdx];
    
    // Display question text and image (if any)
    let questionHTML = `
      <div style="color: var(--orange); font-weight: bold; margin-bottom: 15px;">
        Câu ${currentQIdx + 1}: ${escapeHtml(currentQ.q)}
      </div>
    `;
    
    if (currentQ.qImage) {
      questionHTML += `
        <div style="text-align: center; margin: 15px 0;">
          <img src="${currentQ.qImage}" 
               style="max-width: 100%; max-height: 300px; border: 1px solid #ccc; border-radius: 5px;"
               onerror="this.style.display='none'">
        </div>
      `;
    }
    
    questionBlock.innerHTML = questionHTML;

    if (quizType === 'multi') {
      // Multiple choice questions
      answersBlock.style.display = 'block';
      currentQ.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        
        let answerContent = `${String.fromCharCode(65 + i)}. ${escapeHtml(ans.text)}`;
        
        if (ans.image) {
          answerContent += `
            <div style="margin-top: 8px; text-align: center;">
              <img src="${ans.image}" 
                   style="max-width: 100%; max-height: 150px; border: 1px solid #ddd; border-radius: 3px;"
                   onerror="this.style.display='none'">
            </div>
          `;
        }
        
        btn.innerHTML = answerContent;
        btn.onclick = () => handleMultiAnswerClick(btn, ans.correct, currentQ.answers);
        answersBlock.appendChild(btn);
      });

    } else if (quizType === 'truefalse') {
      // True/False questions
      answersBlock.style.display = 'block';
      currentTFAnswerIdx = 0;
      showTrueFalseAnswer(currentQ.answers[currentTFAnswerIdx]);
      
    } else if (quizType === 'essay') {
      // Essay questions
      essayInputBlock.style.display = 'block';
    }
  }

  function handleMultiAnswerClick(btn, isCorrect, allAnswers) {
    Array.from(answersBlock.children).forEach(b => b.classList.add('disabled'));

    doneCount++;
    doneCountSpan.textContent = doneCount;

    if(isCorrect) {
      btn.classList.add('correct');
      correctCount++;
      correctCountSpan.textContent = correctCount;
    } else {
      btn.classList.add('incorrect');
      wrongCount++;
      wrongCountSpan.textContent = wrongCount;
      // Highlight correct answer
      const correctAns = allAnswers.find(a => a.correct);
      for(let b of answersBlock.children) {
        // Cẩn thận với việc so sánh textContent trực tiếp nếu có hình ảnh
        // Cần lấy chỉ phần text của câu trả lời
        const btnText = b.childNodes[0].nodeType === 3 ? b.childNodes[0].nodeValue.substring(3).trim() : ''; // Lấy text trước hình ảnh
        const correctText = escapeHtml(correctAns.text);

        if(btnText === correctText && correctAns.correct) {
          b.classList.add('correct');
          break;
        }
      }
    }
    btnNext.style.display = 'inline-block';
  }

  function showTrueFalseAnswer(answerObj) {
    answersBlock.innerHTML = '';

    const label = document.createElement('div');
    label.style.marginBottom = '10px';
    label.style.fontWeight = 'bold';
    label.textContent = `Câu hỏi phụ ${currentTFAnswerIdx + 1}: ${answerObj.text}`;
    answersBlock.appendChild(label);

    if (answerObj.image) {
      const imgDiv = document.createElement('div');
      imgDiv.style.textAlign = 'center';
      imgDiv.style.margin = '10px 0';
      imgDiv.innerHTML = `<img src="${answerObj.image}" style="max-width: 100%; max-height: 200px; border: 1px solid #ccc; border-radius: 3px;" onerror="this.style.display='none'">`;
      answersBlock.appendChild(imgDiv);
    }

    const btnTrue = document.createElement('button');
    btnTrue.className = 'answer-btn';
    btnTrue.textContent = 'Đúng';
    btnTrue.onclick = () => handleTrueFalseAnswerClick(true, answerObj.correct);
    answersBlock.appendChild(btnTrue);
    
    const btnFalse = document.createElement('button');
    btnFalse.className = 'answer-btn';
    btnFalse.textContent = 'Sai';
    btnFalse.onclick = () => handleTrueFalseAnswerClick(false, answerObj.correct);
    answersBlock.appendChild(btnFalse);
  }

  function handleTrueFalseAnswerClick(userAnswer, correctAnswer) {
    Array.from(answersBlock.querySelectorAll('button')).forEach(b => b.classList.add('disabled'));

    doneCount++;
    doneCountSpan.textContent = doneCount;

    if(userAnswer === correctAnswer) {
      correctCount++;
      correctCountSpan.textContent = correctCount;
      Array.from(answersBlock.querySelectorAll('button')).forEach(b => {
        if(b.textContent.toLowerCase() === (userAnswer ? 'đúng' : 'sai')) {
          b.classList.add('correct');
        }
      });
    } else {
      wrongCount++;
      wrongCountSpan.textContent = wrongCount;
      Array.from(answersBlock.querySelectorAll('button')).forEach(b => {
        if(b.textContent.toLowerCase() === (userAnswer ? 'đúng' : 'sai')) {
          b.classList.add('incorrect');
        }
        if(b.textContent.toLowerCase() === (correctAnswer ? 'đúng' : 'sai')) {
          b.classList.add('correct');
        }
      });
    }

    btnNext.style.display = 'inline-block';
  }

  // Essay submit handler
  btnEssaySubmit.onclick = () => {
    const userText = essayAnswerTextarea.value.trim();
    if(userText.length === 0) {
      alert('Hãy nhập câu trả lời trước khi nhấn "Xong"');
      return;
    }
    btnEssaySubmit.disabled = true; // Vô hiệu hóa nút "Xong" sau khi submit
    
    doneCount++;
    doneCountSpan.textContent = doneCount;

    const currentQ = questions[currentQIdx];
    let answerRefHTML = `<br><br><em><strong>Đáp án tham khảo:</strong> ${currentQ.answerRef}</em>`;
    
    if(currentQ.answerRefImage) {
      answerRefHTML += `<div style="margin: 15px 0; text-align: center;">
        <img src="${currentQ.answerRefImage}" style="max-width: 100%; max-height: 300px; border: 1px solid #ccc; border-radius: 5px;">
      </div>`;
    }
    
    questionBlock.innerHTML += answerRefHTML;
    btnNext.style.display = 'inline-block';
  };

  btnNext.onclick = () => {
    // Ẩn nút "Tiếp tục"
    btnNext.style.display = 'none';
    // Đảm bảo nút "Xong" (essay) được kích hoạt lại
    btnEssaySubmit.disabled = false; 

    if(quizType === 'truefalse') {
      currentTFAnswerIdx++;
      const currentQ = questions[currentQIdx];
      // Nếu còn câu hỏi phụ trong câu hỏi Đúng/Sai hiện tại
      if(currentTFAnswerIdx < currentQ.answers.length) {
        showTrueFalseAnswer(currentQ.answers[currentTFAnswerIdx]);
        return; // Không chuyển sang câu hỏi tiếp theo mà hiển thị câu phụ
      }
    }

    // Chuyển sang câu hỏi tiếp theo
    currentQIdx++;
    showQuestion();
  };

  function endQuiz() {
    stopTimer();
    quizSection.style.display = 'none';
    resultSection.style.display = 'block';
    toggleThemeBtn.style.display = 'block'; // Hiển thị lại nút chuyển theme

    resultTime.textContent = formatTime(timeSeconds);
    resultTotal.textContent = doneCount;
    resultCorrect.textContent = correctCount;
    resultWrong.textContent = wrongCount;

    starRating.innerHTML = '';

    // Logic tính sao đã được khôi phục và tinh chỉnh
    if(quizType === 'multi' || quizType === 'truefalse') {
      let starsGreen = 0;
      let starsGray = 0;
      
      if(wrongCount === 0) { // Nếu không có câu sai
        starsGreen = 3; // 3 sao xanh
      } else if (wrongCount >= 1 && wrongCount <= 3) {
        starsGreen = 2; // 2 sao xanh
        starsGray = 1; // 1 sao xám
      } else if (wrongCount >= 4 && wrongCount <= 9) {
        starsGreen = 1; // 1 sao xanh
        starsGray = 2; // 2 sao xám
      } else { // wrongCount >= 10
        starsGreen = 0; // 0 sao xanh
        starsGray = 3; // 3 sao xám
      }

      for(let i = 1; i <= 3; i++) {
        const star = document.createElement('span');
        star.classList.add('star');
        if(i <= starsGreen) star.classList.add('Green');
        else if(i <= starsGray) star.classList.add('gray');
        star.innerHTML = '&#9733;';
        starRating.appendChild(star);
      }
    } else if (quizType === 'essay') {
        // Đối với bài tự luận, không có điểm đúng/sai tự động
        // Bạn có thể thêm logic chấm điểm thủ công hoặc hiển thị thông báo khác
        const infoDiv = document.createElement('div');
        infoDiv.textContent = "Bài Tự Luận Cần Được Giáo Viên Chấm Điểm.";
        infoDiv.style.fontWeight = "bold";
        infoDiv.style.marginTop = "20px";
        starRating.appendChild(infoDiv);
    }
  }

  // --- EVENT LISTENERS ---
  // Đã xóa btnRestart.onclick và logic liên quan
  // Nếu bạn muốn chức năng "làm lại" bài quiz, bạn cần tạo một nút mới với ID khác
  // và thêm lại logic reset Stats vào event listener của nút đó.

  // Nút Home (ở màn hình kết quả) - vẫn reload trang hiện tại
  btnHome.onclick = () => {
    location.reload(); 
  };

  btnMulti.onclick = () => initQuiz('multi');
  btnTrueFalse.onclick = () => initQuiz('truefalse');
  btnEssay.onclick = () => initQuiz('essay');
  // New: Download button functionality
  btnDownload.onclick = () => {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'toancreator-default'; // Set the desired filename
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };
  
  
  // Xử lý sự kiện cho nút Exit mới
  btnExit.onclick = () => {
    window.location.href = 'https://youtu.be/dQw4w9WgXcQ?si=vCkTUiFy48Qx_jXf'; // Chuyển hướng về index.html
  };

  // Xử lý sự kiện cho nút Back to Home trong quiz
  btnBackHomeInQuiz.onclick = () => {
    if (confirm('Bạn có chắc chắn muốn thoát bài làm hiện tại?')) {
      stopTimer(); // Dừng đồng hồ
      location.reload(); // Tải lại trang promt-onlineV2.html
    }
  };

  toggleThemeBtn.onclick = () => {
    document.body.classList.toggle('dark');
  };

  // Ẩn/hiện nút toggle theme ban đầu
  // Bạn có thể đặt nút toggle theme ở vị trí cố định thay vì ẩn/hiện tùy thuộc vào màn hình
  // Hiện tại, nó sẽ luôn hiển thị trừ khi bị ẩn bởi CSS hoặc logic khác
  toggleThemeBtn.style.display = 'block'; 
})();
</script>
</body>
</html>
